name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if [ -f requirements-test.txt ]; then python -m pip install -r requirements-test.txt; fi
      - name: Run unit and integration tests
        env:
          FREIGHTDOC_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: python -m pytest tests -m "not live" -q

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install exact dependencies
        run: npm ci
      - name: Run frontend unit/component tests
        run: npm test -- --run
      - name: Build Vite application
        run: npm run build
      - name: Verify PWA release artefacts
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/sw.js
          test -s dist/offline.html
          grep -q 'rel="manifest"' dist/index.html
          grep -q 'denylist' dist/sw.js
      - name: Validate release descriptors and tracked-file hygiene
        run: python ../scripts/verify_release.py

  release-descriptors:
    name: Docker, Render, Vercel and API contract checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run deterministic release checks
        run: python scripts/verify_release.py

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject tracked environment files and common high-risk tokens
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.(local|production|development|test)$'; then
            echo 'Runtime environment files must not be tracked; .env.example templates are allowed.' >&2
            exit 1
          fi
          if git grep -n -I -E '(gsk_[A-Za-z0-9_-]{16,}|npg_[A-Za-z0-9_-]{16,}|sk_(live|test)_[A-Za-z0-9_-]{16,}|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY)' -- .; then
            echo 'Potential secret detected in tracked source.' >&2
            exit 1
          fi
